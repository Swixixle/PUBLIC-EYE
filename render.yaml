services:
  - type: web
    name: frame-api
    runtime: python
    rootDir: .
    buildCommand: |
      export DEBIAN_FRONTEND=noninteractive
      apt-get update -y
      apt-get install -y tesseract-ocr ffmpeg
      apt-get install -y deno
      npm ci
      npm run build
      pip install -r apps/api/requirements.txt
    startCommand: cd apps/api && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    plan: starter
    numInstances: 1
    envVars:
      - key: FRAME_REPO_ROOT
        value: /opt/render/project/src
        sync: false
      - key: FRAME_KEY_FORMAT
        value: base64
      - key: FRAME_PRIVATE_KEY
        sync: false
      - key: FRAME_PUBLIC_KEY
        sync: false
  - type: worker
    name: frame-worker
    runtime: python
    rootDir: .
    buildCommand: pip install -r apps/api/requirements.txt
    startCommand: cd apps/api && python worker.py
    envVars:
      - key: REDIS_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FEC_API_KEY
        sync: false
      - key: FRAME_REPO_ROOT
        value: /opt/render/project/src
        sync: false
      - key: FRAME_PRIVATE_KEY
        sync: false
      - key: FRAME_PUBLIC_KEY
        sync: false
